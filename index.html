<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="propofol"/>
<meta name="theme-color" content="#e4f5f0"/>
<title>propofol</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root {
  --mint:       #d4f0e8;
  --mint-mid:   #a8dfd0;
  --mint-deep:  #5cbba3;
  --teal:       #2a9d8f;
  --teal-dk:    #1a7060;
  --lav:        #e8e0fc;
  --lav-mid:    #c4b4f0;
  --lav-deep:   #8b7fd4;
  --rose:       #fde8f4;
  --rose-mid:   #f0b8d8;
  --rose-deep:  #c060a0;
  --cream:      #fffdf8;
  --sand:       #f5efe0;
  --peach:      #ffe8d0;
  --text-dk:    #2a201a;
  --text-md:    #6b5f58;
  --text-soft:  #a09890;
  --white:      #ffffff;
  --r-pill:     100px;
  --r-lg:       28px;
  --r-xl:       40px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body {
  height:100%; width:100%;
  font-family:'Nunito',sans-serif;
  background:#e4f5f0;
  color:var(--text-dk);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ── SCREENS ───────────────────────────── */
.screen {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center;
  opacity:0; pointer-events:none;
  transition:opacity 0.35s ease;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
.screen.active { opacity:1; pointer-events:all; }

/* ── BACKGROUND ────────────────────────── */
.bg {
  position:fixed; inset:0; z-index:0; overflow:hidden;
  background:linear-gradient(170deg, #c0ece0 0%, #daf4ee 30%, #f0faf7 60%, #fdfff9 100%);
}
.bg-blob {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,0.25);
  animation:blobDrift var(--bd,14s) var(--bdd,0s) ease-in-out infinite alternate;
}
@keyframes blobDrift {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(var(--bx,20px),var(--by,-30px)) scale(var(--bs,1.08)); }
}

/* ── OR SCENE AREA ─────────────────────── */
.scene-wrap {
  width:100%; max-width:480px;
  position:relative; z-index:5;
  flex-shrink:0;
}
.or-scene { width:100%; display:block; }

/* ── CARD PANEL ─────────────────────────── */
.card {
  background:var(--white);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  box-shadow:0 -6px 40px rgba(42,157,143,0.12);
  width:100%; max-width:480px;
  flex:1; min-height:0;
  padding:24px 24px max(32px, env(safe-area-inset-bottom,20px));
  display:flex; flex-direction:column;
  align-items:center; gap:18px;
  position:relative; z-index:10;
}
.card-pill {
  width:36px; height:4px;
  border-radius:2px;
  background:var(--mint-mid);
  flex-shrink:0;
}

/* ── TYPE ───────────────────────────────── */
.app-name {
  font-family:'Fredoka One',cursive;
  font-size:32px; color:var(--teal);
  letter-spacing:1px; text-align:center;
}
.app-tagline {
  font-size:12px; font-weight:700;
  color:var(--text-soft); letter-spacing:1px;
  text-transform:uppercase; text-align:center;
  margin-top:-10px;
}

/* ── STATUS PILL ────────────────────────── */
.status-pill {
  display:inline-flex; align-items:center; gap:7px;
  background:var(--mint); color:var(--teal);
  border-radius:var(--r-pill); padding:7px 16px;
  font-size:12px; font-weight:800; letter-spacing:0.4px;
}
.pulse-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--teal);
  animation:pd 1.6s ease-in-out infinite;
}
@keyframes pd { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

/* ── TIMER ──────────────────────────────── */
.timer-wrap {
  position:relative;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.timer-svg { filter:drop-shadow(0 6px 18px rgba(42,157,143,0.2)); }
.timer-inner {
  position:absolute; text-align:center;
  display:flex; flex-direction:column; align-items:center;
}
.timer-digits {
  font-family:'Fredoka One',cursive;
  font-size:56px; color:var(--teal);
  line-height:1; letter-spacing:2px;
}
.timer-lbl {
  font-size:11px; font-weight:800;
  color:var(--text-soft); text-transform:uppercase; letter-spacing:1px;
  margin-top:4px;
}

/* ── VITALS ─────────────────────────────── */
.vitals { display:flex; gap:10px; width:100%; }
.vital {
  flex:1; background:var(--sand);
  border-radius:var(--r-lg); padding:10px 6px; text-align:center;
}
.vital-n {
  font-family:'Fredoka One',cursive;
  font-size:22px; color:var(--teal); line-height:1;
}
.vital-l {
  font-size:10px; font-weight:800;
  color:var(--text-soft); text-transform:uppercase;
  letter-spacing:0.7px; margin-top:2px;
}

/* ── DURATION CHIPS ─────────────────────── */
.dur-lbl {
  font-size:11px; font-weight:800; color:var(--text-soft);
  text-transform:uppercase; letter-spacing:0.8px;
  align-self:flex-start;
}
.chips { display:flex; gap:8px; flex-wrap:wrap; width:100%; }
.chip {
  padding:8px 16px; border-radius:var(--r-pill);
  font-size:14px; font-weight:800;
  cursor:pointer; border:2px solid transparent;
  background:var(--sand); color:var(--text-md);
  transition:all 0.2s ease;
  font-family:'Nunito',sans-serif;
}
.chip.on { background:var(--mint); border-color:var(--teal); color:var(--teal); }

/* ── HEARTS ─────────────────────────────── */
.hearts-lbl {
  font-size:11px; font-weight:800; color:var(--text-soft);
  text-transform:uppercase; letter-spacing:0.8px;
  align-self:flex-start;
}
.hearts-row { display:flex; gap:7px; flex-wrap:wrap; width:100%; }
.h-slot {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:17px; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.h-slot.empty { background:var(--sand); opacity:0.45; }
.h-slot.filled { background:var(--rose); animation:hpop 0.45s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes hpop { 0%{transform:scale(0) rotate(-20deg)} 100%{transform:scale(1) rotate(0)} }

/* ── BUTTONS ─────────────────────────────── */
.btn {
  border:none; cursor:pointer;
  font-family:'Nunito',sans-serif; font-weight:800;
  transition:transform 0.12s ease, box-shadow 0.12s ease;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn:active { transform:scale(0.96); }
.btn-go {
  background:linear-gradient(135deg, var(--teal) 0%, var(--mint-deep) 100%);
  color:var(--white); border-radius:var(--r-pill);
  padding:16px 32px; font-size:17px; width:100%;
  box-shadow:0 8px 24px rgba(42,157,143,0.32);
}
.btn-go:hover { box-shadow:0 10px 30px rgba(42,157,143,0.42); transform:translateY(-1px); }
.btn-abort {
  background:transparent; color:#c0607a;
  font-size:13px; padding:8px 18px;
  border-radius:var(--r-pill);
  border:2px solid var(--rose-mid);
}
.btn-abort:hover { background:var(--rose); }
.btn-back {
  background:linear-gradient(135deg, var(--teal) 0%, var(--mint-deep) 100%);
  color:var(--white); border-radius:var(--r-pill);
  padding:15px 32px; font-size:16px; width:100%;
  box-shadow:0 6px 20px rgba(42,157,143,0.28);
}

/* ── DIVIDER ─────────────────────────────── */
.divider { width:100%; height:1px; background:var(--sand); }

/* ── COMPLETE OVERLAY ────────────────────── */
#screen-done {
  background:rgba(212,240,232,0.6);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  justify-content:center;
}
.done-card {
  background:var(--white);
  border-radius:var(--r-xl); padding:40px 28px;
  margin:24px; text-align:center;
  box-shadow:0 20px 60px rgba(42,157,143,0.18);
  max-width:360px; width:calc(100% - 48px);
  display:flex; flex-direction:column; align-items:center; gap:14px;
}
.done-emoji {
  font-size:80px;
  animation:bigBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  filter:drop-shadow(0 8px 20px rgba(240,96,144,0.3));
}
@keyframes bigBounce { 0%{transform:scale(0) rotate(-15deg)} 100%{transform:scale(1) rotate(0)} }
.done-title {
  font-family:'Fredoka One',cursive;
  font-size:34px; color:var(--teal);
}
.done-sub { font-size:14px; color:var(--text-md); font-weight:600; line-height:1.5; }

/* ── CHARACTER ANIMATIONS ────────────────── */
@keyframes crnaBob   { 0%,100%{transform:translateY(0)}    50%{transform:translateY(-5px)} }
@keyframes patBreath { 0%,100%{transform:scaleX(1) scaleY(1)} 50%{transform:scaleX(1.02) scaleY(0.97)} }
@keyframes surgBob   { 0%,100%{transform:rotate(0)}        40%{transform:rotate(1.5deg)}  80%{transform:rotate(-1deg)} }
@keyframes zFloat    { 0%{opacity:0;transform:translate(0,0) scale(0.5)} 40%{opacity:0.9} 100%{opacity:0;transform:translate(-10px,-30px) scale(1)} }
@keyframes ekgAnim   { 0%{stroke-dashoffset:120} 100%{stroke-dashoffset:0} }
@keyframes starSpin  { 0%,100%{transform:translateY(0) rotate(0)}  50%{transform:translateY(-9px) rotate(18deg)} }
@keyframes lightPulse{ 0%,100%{opacity:0.85} 50%{opacity:1} }
@keyframes ivDrip    { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════ -->
<!--  SCREEN 1 — SETUP                                     -->
<!-- ══════════════════════════════════════════════════════ -->
<div class="screen active" id="screen-setup">
  <div class="bg">
    <div class="bg-blob" style="width:280px;height:280px;top:-60px;left:-80px;--bd:16s;--bx:30px;--by:20px;--bs:1.1"></div>
    <div class="bg-blob" style="width:200px;height:200px;bottom:20%;right:-50px;--bd:12s;--bdd:3s;--bx:-20px;--by:-40px;--bs:0.95"></div>
  </div>

  <div class="scene-wrap" style="margin-top:env(safe-area-inset-top,0px)">
    <!-- SETUP SCENE SVG -->
    <svg class="or-scene" viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="sg" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#ffe8d0"/><stop offset="100%" stop-color="#f4c8a8"/></radialGradient>
        <radialGradient id="sg2" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#fde4c8"/><stop offset="100%" stop-color="#edba90"/></radialGradient>
        <radialGradient id="cg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffb8a0" stop-opacity="0.8"/><stop offset="100%" stop-color="#ffb8a0" stop-opacity="0"/></radialGradient>
        <radialGradient id="lGlow" cx="50%" cy="0%" r="70%"><stop offset="0%" stop-color="rgba(255,252,220,0.5)"/><stop offset="100%" stop-color="rgba(255,252,220,0)"/></radialGradient>
      </defs>

      <!-- floor shadow -->
      <ellipse cx="240" cy="282" rx="210" ry="14" fill="rgba(168,223,208,0.28)"/>

      <!-- overhead light (off / warm standby) -->
      <ellipse cx="240" cy="18" rx="44" ry="11" fill="#e8f8f2" stroke="#a8dfd0" stroke-width="1.5"/>
      <ellipse cx="240" cy="18" rx="28" ry="7"  fill="#d0f2e8" stroke="#5cbba3" stroke-width="1"/>
      <rect   x="237" y="28"  width="6"  height="22" rx="3" fill="#a8dfd0"/>
      <ellipse cx="240" cy="0" rx="180" ry="90" fill="url(#lGlow)" opacity="0.6"/>

      <!-- OR TABLE -->
      <rect x="120" y="188" width="240" height="18" rx="9" fill="#c8e6df" stroke="#a8dfd0" stroke-width="1.5"/>
      <rect x="152" y="205" width="8"   height="40" rx="4" fill="#b0d4cc"/>
      <rect x="320" y="205" width="8"   height="40" rx="4" fill="#b0d4cc"/>
      <rect x="140" y="242" width="30"  height="7"  rx="3" fill="#a0c8c0"/>
      <rect x="310" y="242" width="30"  height="7"  rx="3" fill="#a0c8c0"/>
      <!-- table pad -->
      <rect x="128" y="176" width="224" height="16" rx="8" fill="#e8f8f4" stroke="#c8e6df" stroke-width="1"/>

      <!-- ── PATIENT ── -->
      <g style="transform-origin:240px 168px; animation:patBreath 3.8s ease-in-out infinite">
        <!-- body / blanket -->
        <rect x="148" y="158" width="184" height="30" rx="15" fill="#e8e0fc" stroke="#d0c4f4" stroke-width="1.2"/>
        <!-- blanket star pattern -->
        <g fill="#b4a4e0" opacity="0.35">
          <path d="M172 168 l2.5 5 l5.5 0 l-4.5 3.5 l1.8 5.5 l-5-3.5 l-5 3.5 l1.8-5.5 l-4.5-3.5 l5.5 0 Z"/>
          <path d="M210 163 l2 4 l4 0 l-3.2 2.5 l1.2 4 l-4-2.5 l-4 2.5 l1.2-4 l-3.2-2.5 l4 0 Z"/>
          <path d="M245 169 l2 4 l4 0 l-3.2 2.5 l1.2 4 l-4-2.5 l-4 2.5 l1.2-4 l-3.2-2.5 l4 0 Z"/>
          <path d="M280 164 l2 4 l4 0 l-3.2 2.5 l1.2 4 l-4-2.5 l-4 2.5 l1.2-4 l-3.2-2.5 l4 0 Z"/>
          <path d="M315 169 l2 4 l4 0 l-3.2 2.5 l1.2 4 l-4-2.5 l-4 2.5 l1.2-4 l-3.2-2.5 l4 0 Z"/>
        </g>
        <!-- pillow -->
        <ellipse cx="145" cy="168" rx="26" ry="18" fill="#f4eeff" stroke="#d8ccf4" stroke-width="1.2"/>
        <!-- patient head -->
        <circle cx="145" cy="150" r="38" fill="url(#sg2)"/>
        <circle cx="145" cy="150" r="38" fill="none" stroke="#e0b888" stroke-width="1"/>
        <!-- ears -->
        <ellipse cx="107" cy="150" rx="9" ry="12" fill="url(#sg2)"/>
        <ellipse cx="107" cy="150" rx="5.5" ry="8" fill="#e8a878"/>
        <ellipse cx="183" cy="150" rx="9" ry="12" fill="url(#sg2)"/>
        <ellipse cx="183" cy="150" rx="5.5" ry="8" fill="#e8a878"/>

        <path d="M127 143 Q136 136 145 143" fill="none" stroke="#7a4830" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M146 143 Q155 136 164 143" fill="none" stroke="#7a4830" stroke-width="2.5" stroke-linecap="round"/>
        <!-- lashes -->
        <line x1="129" y1="141" x2="127" y2="137" stroke="#7a4830" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="136" y1="138" x2="135" y2="134" stroke="#7a4830" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="143" y1="139" x2="143" y2="135" stroke="#7a4830" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="148" y1="139" x2="148" y2="135" stroke="#7a4830" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="155" y1="138" x2="155" y2="134" stroke="#7a4830" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="162" y1="141" x2="164" y2="137" stroke="#7a4830" stroke-width="1.5" stroke-linecap="round"/>
        <!-- brows -->
        <path d="M123 133 Q136 127 146 131" fill="none" stroke="#7a4830" stroke-width="2" stroke-linecap="round"/>
        <path d="M146 131 Q156 127 168 133" fill="none" stroke="#7a4830" stroke-width="2" stroke-linecap="round"/>
        <!-- tiny smile -->
        <path d="M135 160 Q145 167 156 160" fill="none" stroke="#c08860" stroke-width="2" stroke-linecap="round"/>
        <!-- blush -->
        <ellipse cx="120" cy="155" rx="16" ry="9" fill="url(#cg)" opacity="0.55"/>
        <ellipse cx="170" cy="155" rx="16" ry="9" fill="url(#cg)" opacity="0.55"/>
        <!-- breathing tube -->
        <path d="M162 162 Q175 156 188 159" fill="none" stroke="#a8d8d0" stroke-width="4" stroke-linecap="round"/>
        <circle cx="188" cy="159" r="5" fill="#5cbba3" stroke="#3d9e8e" stroke-width="1"/>
        <!-- zzz -->
        <text style="animation:zFloat 3s 0s ease-in-out infinite" font-family="'Fredoka One',cursive" font-size="11" fill="#b4a4e0" x="198" y="140">z</text>
        <text style="animation:zFloat 3s 0.9s ease-in-out infinite" font-family="'Fredoka One',cursive" font-size="15" fill="#9888d0" x="210" y="124">z</text>
        <text style="animation:zFloat 3s 1.8s ease-in-out infinite" font-family="'Fredoka One',cursive" font-size="20" fill="#7868b8" x="225" y="106">z</text>
      </g>

      <!-- ── ANESTHESIA MACHINE (left wall) ── -->
      <rect x="4" y="82" width="34" height="118" rx="9" fill="#e0f6f0" stroke="#a8dfd0" stroke-width="1.5"/>
      <rect x="8" y="88"  width="26" height="36" rx="5" fill="#14403c"/>
      <!-- EKG on screen -->
      <polyline points="10,106 14,106 17,94 20,118 23,100 27,106 36,106"
        fill="none" stroke="#4db8a4" stroke-width="1.8"
        style="stroke-dasharray:120;stroke-dashoffset:120;animation:ekgAnim 2.2s linear infinite"/>
      <!-- knobs -->
      <circle cx="12"  cy="140" r="5" fill="#4db8a4"/>
      <circle cx="26"  cy="140" r="5" fill="#a8dfd0"/>
      <circle cx="12"  cy="156" r="5" fill="#a8dfd0"/>
      <circle cx="26"  cy="156" r="5" fill="#4db8a4"/>
      <!-- IV bag -->
      <path d="M21 82 L21 68 Q21 60 28 55 Q35 50 35 60 L35 82 Z" fill="#d4f0e8" stroke="#a8dfd0" stroke-width="1.2"/>
      <line x1="21" y1="80" x2="38" y2="168" stroke="#c8e6df" stroke-width="1.5" stroke-dasharray="5,3"
        style="animation:ivDrip 2s ease-in-out infinite"/>
      <!-- machine label -->
      <text x="21" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#4db8a4" font-weight="700" letter-spacing="0.5">ANES</text>

      <!-- ── CRNA CHARACTER ── -->
      <g style="transform-origin:74px 162px; animation:crnaBob 4.2s ease-in-out infinite">
        <!-- legs -->
        <rect x="58"  y="232" width="15" height="50" rx="7.5" fill="#2a8a7a"/>
        <rect x="78"  y="232" width="15" height="50" rx="7.5" fill="#2a8a7a"/>
        <ellipse cx="65"  cy="283" rx="12" ry="7" fill="#1a6050"/>
        <ellipse cx="85"  cy="283" rx="12" ry="7" fill="#1a6050"/>
        <!-- torso -->
        <rect x="46" y="150" width="62" height="88" rx="26" fill="#3daa96"/>
        <!-- scrubs collar v -->
        <path d="M77 150 L67 168 L77 178 L87 168 Z" fill="#2a8a7a"/>
        <!-- CRNA badge -->
        <rect x="60" y="182" width="34" height="13" rx="6.5" fill="#fff" stroke="#2a8a7a" stroke-width="1.2"/>
        <text x="77" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#1a6050">CRNA</text>
        <!-- left arm (holding IV) -->
        <rect x="24" y="158" width="24" height="64" rx="12" fill="#3daa96"/>
        <circle cx="36" cy="224" r="13" fill="url(#sg)"/>
        <!-- syringe in hand -->
        <rect x="28" y="210" width="16" height="26" rx="4" fill="#d4f0e8" stroke="#2a8a7a" stroke-width="1.5"/>
        <rect x="33" y="204" width="6" height="9"  rx="3" fill="#2a8a7a"/>
        <rect x="30" y="234" width="12" height="3" rx="1.5" fill="#2a8a7a"/>
        <!-- right arm (clipboard) -->
        <rect x="108" y="158" width="24" height="56" rx="12" fill="#3daa96"/>
        <circle cx="120" cy="216" r="13" fill="url(#sg)"/>
        <!-- clipboard -->
        <rect x="110" y="200" width="30" height="38" rx="5" fill="#fffdf8" stroke="#c8e6df" stroke-width="1.5"/>
        <rect x="118" y="195" width="14" height="9" rx="4.5" fill="#3daa96"/>
        <line x1="114" y1="213" x2="136" y2="213" stroke="#c8e6df" stroke-width="2" stroke-linecap="round"/>
        <line x1="114" y1="221" x2="132" y2="221" stroke="#c8e6df" stroke-width="2" stroke-linecap="round"/>
        <line x1="114" y1="229" x2="136" y2="229" stroke="#c8e6df" stroke-width="2" stroke-linecap="round"/>
        <!-- neck -->
        <rect x="69" y="130" width="16" height="24" rx="8" fill="url(#sg)"/>
        <!-- HEAD -->
        <circle cx="77" cy="108" r="44" fill="url(#sg)"/>
        <circle cx="77" cy="108" r="44" fill="none" stroke="#ecc090" stroke-width="1"/>

<!--  SCREEN 3 — COMPLETE / ABORT                          -->
<!-- ══════════════════════════════════════════════════════ -->
<div class="screen" id="screen-done">
  <div class="done-card" id="done-card">
    <div class="done-emoji" id="done-emoji">❤️</div>
    <div class="done-title" id="done-title">Surgery Complete!</div>
    <div class="done-sub"   id="done-sub">The patient is safe. Heart earned.</div>
    <div class="divider" style="width:100%"></div>
    <div class="hearts-lbl" style="align-self:flex-start">today's hearts</div>
    <div class="hearts-row" id="hearts-done" style="justify-content:center"></div>
    <button class="btn btn-back" id="btn-back">✨ Back to OR</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

const S = {
  min: 25, total: 1500, remain: 1500,
  ticker: null, hrBase: 70,
  hearts: JSON.parse(localStorage.getItem('pf-hearts') || '[]'),
  date: localStorage.getItem('pf-date') || '',
};

const today = new Date().toDateString();
if (S.date !== today) { S.hearts = []; S.date = today; save(); }

function save() {
  localStorage.setItem('pf-hearts', JSON.stringify(S.hearts));
  localStorage.setItem('pf-date', S.date);
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function renderHearts(elId, arr) {
  const el = $(elId); if (!el) return;
  const slots = Math.max(arr.length + 2, 5);
  el.innerHTML = '';
  for (let i = 0; i < slots; i++) {
    const d = document.createElement('div');
    d.className = 'h-slot ' + (i < arr.length ? 'filled' : 'empty');
    d.textContent = '❤️';
    el.appendChild(d);
  }
  if (!arr.length) {
    const m = document.createElement('div');
    m.style.cssText = 'font-size:12px;color:#a09890;font-weight:700;width:100%;';
    m.textContent = 'Complete your first surgery!';
    el.appendChild(m);
  }
}

function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function updateRing(r, t) {
  const c = 2 * Math.PI * 82;
  $('ring').style.strokeDashoffset = c * (1 - r / t);
}

function wiggle() {
  S.hrBase += (Math.random() - 0.5) * 3;
  S.hrBase = Math.max(62, Math.min(78, S.hrBase));
  $('v-hr').textContent = Math.round(S.hrBase);
  $('v-o2').textContent = (98 + Math.round(Math.random() * 2)) + '%';
}

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    S.min = +c.dataset.min;
    S.total = S.min * 60;
    S.remain = S.total;
  });
});

$('btn-start').addEventListener('click', () => {
  S.total = S.min * 60;
  S.remain = S.total;
  $('t-disp').textContent = fmt(S.remain);
  updateRing(S.remain, S.total);
  $('status-txt').textContent = 'Surgery in progress';
  show('screen-focus');
  clearInterval(S.ticker);
  S.ticker = setInterval(() => {
    S.remain--;
    $('t-disp').textContent = fmt(S.remain);
    updateRing(S.remain, S.total);
    wiggle();
    if (S.remain <= 0) { clearInterval(S.ticker); setTimeout(complete, 600); }
  }, 1000);
});

$('btn-abort').addEventListener('click', () => {
  clearInterval(S.ticker);
  showDone(false);
});

$('btn-back').addEventListener('click', () => {
  renderHearts('hearts-setup', S.hearts);
  show('screen-setup');
});

function complete() {
  S.hearts.push(new Date().toISOString());
  save();
  showDone(true);
}

function showDone(success) {
  $('done-emoji').textContent = success ? '❤️' : '😰';
  $('done-title').textContent = success ? 'Surgery Complete!' : 'Patient Woke Up!';
  $('done-sub').textContent = success
    ? (S.hearts.length === 1 ? 'First heart! The whole OR is cheering. 🎉' : S.hearts.length + ' hearts today. You\'re unstoppable. ✨')
    : 'The surgeon was not pleased. No heart earned — try again!';
  $('done-card').style.borderTop = success ? '4px solid #a8dfd0' : '4px solid #f0b8d8';
  renderHearts('hearts-done', S.hearts);
  show('screen-done');
}

renderHearts('hearts-setup', S.hearts);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
